name: Test

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  verify:
    name: Typecheck, tests, and UI regression
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Type check
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm test

      - name: UI smoke tests
        env:
          CI: true
        run: npm run test:ui:smoke

      - name: UI sensitive regression tests
        env:
          CI: true
        run: npm run test:ui:sensitive